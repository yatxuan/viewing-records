<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑房源</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #2d3436; padding: 24px 16px; min-height: 100vh; }
      [v-cloak] { display: none; }
      .container { max-width: 820px; margin: 0 auto; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
      .back-link { color: #6c5ce7; font-size: 14px; font-weight: 700; text-decoration: none; }
      .panel { background: #fff; border: 1px solid #eceef3; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
      h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 6px; }
      .subtitle { color: #8a94a6; font-size: 13px; margin-bottom: 20px; }
      .section-title { color: #7b8494; font-size: 13px; font-weight: 800; letter-spacing: .3px; margin: 20px 0 12px; }
      .section-title:first-of-type { margin-top: 0; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
      .form-row.full { grid-template-columns: 1fr; }
      .form-group { display: flex; flex-direction: column; gap: 6px; }
      .form-group label { color: #7b8494; font-size: 12px; font-weight: 700; }
      .form-group input, .form-group select, .form-group textarea {
        width: 100%; min-height: 40px; padding: 9px 12px; border: 1.5px solid #e1e5ee; border-radius: 8px;
        background: #fbfcfe; color: #1f2937; font: inherit; font-size: 14px; outline: none;
      }
      .form-group textarea { min-height: 72px; resize: vertical; }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6c5ce7; background: #fff; }
      .field-hint { color: #8a94a6; font-size: 11px; line-height: 1.4; }
      .choice-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .choice-item { display: flex; align-items: center; gap: 6px; min-height: 36px; padding: 7px 9px; border: 1.5px solid #e8ebf2; border-radius: 8px; background: #fbfcfe; color: #4b5563; font-size: 12px; font-weight: 700; }
      .choice-item input { width: auto; min-height: auto; margin: 0; }
      .contact-row { display: grid; grid-template-columns: 160px 1fr auto; gap: 10px; align-items: end; margin-bottom: 10px; }
      .star-input { display: flex; align-items: center; gap: 4px; min-height: 40px; }
      .star-input span { cursor: pointer; font-size: 24px; line-height: 1; }
      .star-input .active { color: #f39c12; }
      .star-input .inactive { color: #ddd; }
      .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
      .btn { min-height: 40px; padding: 9px 16px; border: none; border-radius: 9px; font: inherit; font-size: 14px; font-weight: 800; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
      .btn-primary { background: #6c5ce7; color: #fff; }
      .btn-secondary { background: #edf0f5; color: #4b5563; }
      .btn-danger { background: #fff0f0; color: #d63031; }
      .status { padding: 10px 12px; border-radius: 10px; margin-bottom: 14px; font-size: 13px; }
      .status.error { background: #fde8e8; color: #c0392b; }
      .status.ok { background: #e8f5e9; color: #27ae60; }
      @media (max-width: 620px) {
        body { padding: 16px 12px; }
        .panel { padding: 18px; }
        .form-row, .choice-grid, .contact-row { grid-template-columns: 1fr; }
        .actions { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <div class="container">
        <div class="topbar">
          <a class="back-link" href="./index.html">返回列表</a>
        </div>
        <div class="panel">
          <h1>{{ editId ? '编辑房源' : '新增房源' }}</h1>
          <p class="subtitle">保存后会同步到当前配置的数据源，并重新拉取最新数据。</p>
          <div class="status error" v-if="error">{{ error }}</div>
          <div class="status ok" v-if="status">{{ status }}</div>

          <form @submit.prevent="save">
            <div class="section-title">排序与状态</div>
            <div class="form-row">
              <div class="form-group"><label>类型</label>
                <select v-model="form.type"><option value="personal">个人转租</option><option value="agent">中介</option></select>
              </div>
              <div class="form-group"><label>状态</label>
                <select v-model="form.status">
                  <option value="unviewed">未看</option>
                  <option value="viewing">考虑中</option><option value="booked">意向中</option>
                  <option value="living">居住中</option><option value="rejected">不考虑</option>
                </select>
              </div>
            </div>
            <div class="form-row full"><div class="form-group"><label>展示顺序</label><input type="number" v-model="form.displayOrder" placeholder="数字越小越靠前"></div></div>

            <div class="section-title">基本信息</div>
            <div class="form-row full"><div class="form-group"><label>地址</label><input v-model="form.address" required></div></div>
            <div class="form-row">
              <div class="form-group"><label>房租（元/月）</label><input type="number" v-model="form.price"></div>
              <div class="form-group"><label>房间</label>
                <select v-model="form.bedrooms"><option value="">请选择</option><option value="一房">一房</option><option value="两房">两房</option><option value="三房">三房</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>客厅</label>
                <select v-model="form.livingRooms"><option value="">请选择</option><option value="0厅">0厅</option><option value="一厅">一厅</option><option value="两厅">两厅</option></select>
              </div>
              <div class="form-group"><label>阳台</label>
                <select v-model="form.balconies"><option value="">请选择</option><option value="无阳台">无阳台</option><option value="一阳台">一阳台</option><option value="二阳台">二阳台</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>厨房</label>
                <select v-model="form.hasKitchen"><option value="">请选择</option><option value="yes">有厨房</option><option value="no">无厨房</option></select>
              </div>
            </div>
            <div class="form-row" v-if="form.hasKitchen === 'yes'">
              <div class="form-group"><label>做饭方式</label>
                <select v-model="form.cookingType"><option value="">请选择</option><option value="天然气">天然气做饭</option><option value="煤气">煤气做饭</option><option value="电磁炉">电磁炉</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>楼层</label><input v-model="form.floor"></div>
              <div class="form-group"><label>朝向</label>
                <select v-model="form.direction"><option v-for="d in directions" :value="d">{{ d }}</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>面积（㎡）</label><input type="number" step="0.1" v-model="form.area"></div>
              <div class="form-group"><label>采光</label>
                <select v-model="form.lighting"><option value="未知">未知</option><option value="无">无</option><option value="一般">一般</option><option value="良好">良好</option><option value="完美">完美</option></select>
              </div>
            </div>
            <div class="form-row full">
              <div class="form-group"><label>家电家具</label>
                <div class="choice-grid">
                  <label class="choice-item" v-for="item in applianceOptions" :key="item">
                    <input type="checkbox" :value="item" v-model="form.appliances"> {{ item }}
                  </label>
                </div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>装修</label>
                <select v-model="form.decor"><option value="">请选择</option><option value="毛坯">毛坯</option><option value="简装">简装</option><option value="精装">精装</option><option value="豪装">豪装</option></select>
              </div>
              <div class="form-group"><label>电梯</label>
                <select v-model="form.elevator"><option value="未知">未知</option><option value="有电梯">有电梯</option><option value="无电梯">无电梯</option></select>
              </div>
            </div>

            <div class="section-title">费用明细</div>
            <div class="form-row">
              <div class="form-group"><label>水电网情况</label><input v-model="form.waterElectric"></div>
              <div class="form-group"><label>水电类型</label>
                <select v-model="form.utility"><option value="民水民电">民水民电</option><option value="商水商电">商水商电</option><option value="民水商电">民水商电</option><option value="未知">未知</option></select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>网络</label>
                <select v-model="form.networkMode"><option value="未知">未知</option><option value="房东提供">房东提供</option><option value="自己签网络">自己签网络</option></select>
              </div>
              <div class="form-group" v-if="form.networkMode === '房东提供'"><label>网络费用（元/月）</label><input type="number" v-model="form.networkFee"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>电费（元/度）</label><input type="number" step="0.01" v-model="form.electricPrice"></div>
              <div class="form-group"><label>每月用电量（度）</label><input type="number" v-model="form.elecUsage"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>水费（元/吨）</label><input type="number" step="0.1" v-model="form.waterPrice"></div>
              <div class="form-group"><label>每月用水量（吨）</label><input type="number" v-model="form.waterUsage"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>物业费（元/㎡/月）</label><input type="number" step="0.1" v-model="form.propFee"></div>
              <div class="form-group"><label>服务费（元/月）</label><input type="number" v-model="form.serviceFee"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>押金方式</label>
                <select v-model="form.deposit"><option value="">请选择</option><option value="押一付一">押一付一</option><option value="押二付一">押二付一</option><option value="押一付三">押一付三</option></select>
              </div>
              <div class="form-group"><label>中介费</label><input v-model="form.agentFee"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>租期</label>
                <select v-model="form.leaseTerm"><option value="">请选择</option><option value="1年">1年</option><option value="半年">半年</option><option value="1年可续">1年可续</option></select>
              </div>
              <div class="form-group"><label>评分</label>
                <div class="star-input">
                  <span v-for="i in 5" :key="i" :class="i <= form.score ? 'active' : 'inactive'" @click="form.score = i">★</span>
                </div>
              </div>
            </div>
            <div class="form-row full"><div class="form-group"><label>入住优惠策略</label><textarea v-model="form.discountStrategy"></textarea></div></div>

            <div class="section-title">联系与备注</div>
            <div class="form-row">
              <div class="form-group"><label>看房时间</label><input type="datetime-local" v-model="form.viewTime"></div>
              <div class="form-group"><label>来源</label>
                <select v-model="form.source"><option value="">请选择</option><option v-for="s in sources" :value="s">{{ s }}</option></select>
              </div>
            </div>
            <div class="form-row full">
              <div class="form-group"><label>联系方式（可多个）</label>
                <div class="contact-row" v-for="(contact, idx) in form.contacts" :key="idx">
                  <div class="form-group"><label>渠道</label>
                    <select v-model="contact.type"><option v-for="type in contactTypes" :value="type">{{ type }}</option></select>
                  </div>
                  <div class="form-group"><label>联系方式</label><input v-model="contact.value" placeholder="账号、手机号、主页链接等"></div>
                  <button class="btn btn-danger" type="button" @click="removeContact(idx)">删除</button>
                </div>
                <button class="btn btn-secondary" type="button" @click="addContact">添加联系方式</button>
              </div>
            </div>
            <div class="form-row full"><div class="form-group"><label>优点</label><textarea v-model="form.pros"></textarea></div></div>
            <div class="form-row full"><div class="form-group"><label>缺点 / 隐忧</label><textarea v-model="form.cons"></textarea></div></div>
            <div class="form-row full"><div class="form-group"><label>备注</label><textarea v-model="form.notes"></textarea></div></div>

            <div class="actions">
              <a class="btn btn-secondary" href="./index.html">取消</a>
              <button class="btn btn-primary" type="submit" :disabled="saving">{{ saving ? '保存中...' : '保存' }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const { createApp, reactive, ref, onMounted } = Vue;

      createApp({
        setup() {
          const DEFAULTS = { owner: "yatxuan", repo: "viewing-records", branch: "main", filepath: "data.json" };
          const id = new URLSearchParams(location.search).get("id");
          const editId = ref(id ? Number(id) || id : null);
          const houses = ref([]);
          const saving = ref(false);
          const error = ref("");
          const status = ref("");
          const directions = ["未知", "南", "东南", "东", "西南", "西", "北"];
          const sources = ["", "抖音", "咸鱼", "小红书", "58同城", "豆瓣", "朋友圈", "其他"];
          const applianceOptions = ["床", "冰箱", "空调", "洗衣机", "热水器"];
          const contactTypes = ["微信", "电话", "小红书", "咸鱼", "抖音", "其他"];
          const form = reactive({
            id: "", type: "personal", status: "unviewed", displayOrder: "", address: "", price: "", roomType: "",
            bedrooms: "", livingRooms: "", balconies: "", hasKitchen: "", toilets: "一厕", cookingType: "", floor: "", direction: "未知",
            area: "", furniture: "", appliances: [], lighting: "未知", decor: "", lightingNote: "", elevator: "未知", waterElectric: "", utility: "民水民电",
            networkMode: "未知", networkFee: "", electricPrice: "", elecUsage: "425", waterPrice: "", waterUsage: "2", propFee: "", serviceFee: "",
            deposit: "", agentFee: "", leaseTerm: "", discountStrategy: "", score: "", viewTime: "", source: "",
            contacts: [], pros: "", cons: "", notes: "", satisfaction: ""
          });

          function getConfig() { try { return JSON.parse(localStorage.getItem("vr_config") || "{}"); } catch { return {}; } }
          function getGhCfg() {
            const c = getConfig();
            return { owner: c.owner || DEFAULTS.owner, repo: c.repo || DEFAULTS.repo, branch: c.branch || DEFAULTS.branch, filepath: c.filepath || DEFAULTS.filepath, token: c.token || "" };
          }
          function ghHeaders(g, extra = {}) {
            return { Accept: "application/vnd.github+json", Authorization: `Bearer ${g.token}`, "X-GitHub-Api-Version": "2022-11-28", ...extra };
          }
          async function readGithubError(resp) {
            try { const json = await resp.json(); return json.message ? `HTTP ${resp.status}: ${json.message}` : `HTTP ${resp.status}`; }
            catch { return `HTTP ${resp.status}`; }
          }
          async function fetchWithTimeout(url, options = {}, timeoutMs = 8000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try { return await fetch(url, { ...options, signal: controller.signal }); }
            finally { clearTimeout(timer); }
          }
          function b64Decode(str) {
            const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
            return new TextDecoder().decode(bytes);
          }
          function localDataPaths(filepath) {
            const configuredFile = (filepath || DEFAULTS.filepath).split("/").pop();
            return [...new Set([configuredFile ? `./${configuredFile}` : "", filepath ? `./${filepath}` : "", `./${DEFAULTS.filepath}`].filter(Boolean))];
          }
          async function fetchLocalFile(filepath) {
            for (const path of localDataPaths(filepath)) {
              try { const resp = await fetch(path); if (resp.ok) return resp.json(); } catch {}
            }
            const raw = localStorage.getItem("vr_local_data");
            return raw ? JSON.parse(raw) : [];
          }
          async function fetchFile() {
            const g = getGhCfg();
            if (!g.token) {
              const raw = localStorage.getItem("vr_local_data");
              return raw ? JSON.parse(raw) : fetchLocalFile(g.filepath);
            }
            try {
              const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.filepath}?ref=${g.branch}`;
              const resp = await fetchWithTimeout(url, { headers: ghHeaders(g) });
              if (!resp.ok) throw new Error(await readGithubError(resp));
              const json = await resp.json();
              return JSON.parse(b64Decode(json.content).replace(/\n$/, ""));
            } catch {
              return fetchLocalFile(g.filepath);
            }
          }
          async function fetchRemoteSha(g) {
            const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.filepath}?ref=${g.branch}`;
            const resp = await fetchWithTimeout(url, { headers: ghHeaders(g) });
            if (resp.status === 404) return "";
            if (!resp.ok) throw new Error(await readGithubError(resp));
            const json = await resp.json();
            return json.sha || "";
          }
          async function putRemoteFile(g, data, sha) {
            const body = { message: `update: ${data.length} properties`, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))), branch: g.branch };
            if (sha) body.sha = sha;
            return fetchWithTimeout(`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.filepath}`, {
              method: "PUT", headers: ghHeaders(g, { "Content-Type": "application/json" }), body: JSON.stringify(body)
            });
          }
          async function updateFile(data) {
            const g = getGhCfg();
            if (!g.token) { localStorage.setItem("vr_local_data", JSON.stringify(data)); return; }
            let sha = await fetchRemoteSha(g);
            let resp = await putRemoteFile(g, data, sha);
            if (resp.status === 409) {
              sha = await fetchRemoteSha(g);
              resp = await putRemoteFile(g, data, sha);
            }
            if (!resp.ok) throw new Error(await readGithubError(resp));
          }
          function nextId() { return houses.value.length ? Math.max(...houses.value.map(h => Number(h.id) || 0)) + 1 : 1; }
          function roomSummary(h) {
            const parts = [h.bedrooms, h.livingRooms, h.balconies, h.hasKitchen === "yes" ? "有厨房" : h.hasKitchen === "no" ? "无厨房" : "", h.toilets].filter(Boolean);
            return parts.join("");
          }
          function normalizeHouse() {
            const house = { ...form, appliances: [...form.appliances], contacts: form.contacts.filter(c => c.type && c.value).map(c => ({ type: c.type, value: c.value })) };
            house.toilets = "一厕";
            house.roomType = roomSummary(house);
            house.furniture = house.appliances.join("、");
            if (house.hasKitchen !== "yes") house.cookingType = "";
            if (house.networkMode !== "房东提供") house.networkFee = "";
            return house;
          }
          function addContact() { form.contacts.push({ type: "微信", value: "" }); }
          function removeContact(index) { form.contacts.splice(index, 1); }
          function applyDefaults() {
            if (!form.status) form.status = "unviewed";
            if (!form.utility) form.utility = "民水民电";
            if (!form.elevator) form.elevator = "未知";
            if (!form.networkMode) form.networkMode = "未知";
            if (!form.lighting) form.lighting = "未知";
            if (!form.direction) form.direction = "未知";
            form.toilets = "一厕";
          }
          async function load() {
            houses.value = await fetchFile();
            if (!editId.value) { applyDefaults(); addContact(); return; }
            const house = houses.value.find(h => String(h.id) === String(editId.value));
            if (!house) { error.value = "没有找到要编辑的房源"; return; }
            Object.keys(form).forEach(k => { if (house[k] !== undefined) form[k] = house[k]; });
            form.appliances = Array.isArray(house.appliances) ? [...house.appliances] : [];
            form.contacts = Array.isArray(house.contacts) ? house.contacts.map(c => ({ ...c })) : [];
            applyDefaults();
            if (!form.contacts.length) addContact();
          }
          async function save() {
            saving.value = true; error.value = ""; status.value = "保存中...";
            try {
              const house = { ...normalizeHouse(), id: editId.value || nextId() };
              const next = houses.value.slice();
              const idx = next.findIndex(h => String(h.id) === String(house.id));
              if (idx >= 0) next[idx] = house; else next.push(house);
              await updateFile(next);
              status.value = "保存成功，正在返回列表...";
              setTimeout(() => { window.location.href = "./index.html"; }, 500);
            } catch (e) {
              error.value = "保存失败: " + e.message;
            } finally {
              saving.value = false;
            }
          }
          onMounted(load);
          return { editId, form, saving, error, status, directions, sources, applianceOptions, contactTypes, addContact, removeContact, save };
        }
      }).mount("#app");
    </script>
  </body>
</html>
