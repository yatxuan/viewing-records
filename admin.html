<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 看房记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f6fa; color: #2d3436; padding: 24px 16px; min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  header p { color: #888; font-size: 13px; margin-top: 4px; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #6c5ce7; text-decoration: none; font-size: 14px; }
  .back-link:hover { text-decoration: underline; }

  /* Login */
  .login-box {
    background: #fff; border-radius: 16px; padding: 32px; max-width: 360px;
    margin: 60px auto; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center;
  }
  .login-box h2 { margin-bottom: 20px; font-size: 18px; }
  .login-box input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; margin-bottom: 12px; outline: none;
  }
  .login-box input:focus { border-color: #6c5ce7; }
  .login-box .btn { width: 100%; }
  .login-error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #6c5ce7; color: #fff; }
  .btn-primary:hover { background: #5b4cdb; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: #dfe6e9; color: #2d3436; }
  .btn-secondary:hover { background: #b2bec3; }
  .btn-danger { background: #ff7675; color: #fff; }
  .btn-danger:hover { background: #d63031; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

  /* Status */
  .status-msg {
    padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
  }
  .status-msg.show { display: block; }
  .status-msg.success { background: #e8f5e9; color: #27ae60; }
  .status-msg.error { background: #fde8e8; color: #c0392b; }
  .status-msg.loading { background: #e8f4fd; color: #2980b9; }

  /* House list */
  .house-list { display: flex; flex-direction: column; gap: 12px; }
  .house-item {
    background: #fff; border-radius: 12px; padding: 16px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center;
  }
  .house-info { flex: 1; }
  .house-info .addr { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .house-info .meta { font-size: 12px; color: #888; }
  .house-actions { display: flex; gap: 6px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; font-family: inherit; transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6c5ce7; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* Stars in form */
  .star-input { display: flex; gap: 4px; margin-top: 4px; }
  .star-input .star { font-size: 22px; cursor: pointer; transition: transform 0.15s; }
  .star-input .star:hover { transform: scale(1.2); }
  .star-input .star.active { color: #f39c12; }
  .star-input .star.inactive { color: #ddd; }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .house-item { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="./index.html" class="back-link">← 返回看房记录</a>

  <!-- 登录界面 -->
  <div id="loginView">
    <div class="login-box">
      <h2>🔐 管理后台</h2>
      <p class="login-error" id="loginError">密码错误</p>

      <br>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
      <p style="font-size:12px;color:#aaa;margin-top:16px;">默认密码: admin123<br>首次使用请登录后修改</p>

  <!-- 管理界面 -->
  <div id="adminView" style="display:none;">

<!-- 编辑弹窗 -->

<script>
// ====== 配置 & 状态 ======
let houses = [];
let sha = '';       // data.json 的 SHA，更新时需要
let currentStars = 0;

const DEFAULTS = {
  owner: 'yatxuan',
  repo: 'viewing-records',
  branch: 'main',
  filepath: 'data.json',
  password: 'admin123',
};

function getConfig() {
  try {
    return JSON.parse(localStorage.getItem('vr_config') || '{}');
  } catch { return {}; }
}

function setConfig(cfg) {
  localStorage.setItem('vr_config', JSON.stringify(cfg));
}

function getPassword() {
  const cfg = getConfig();
  return cfg.password || DEFAULTS.password;
}

function getGhConfig() {
  const cfg = getConfig();
  return {
    owner: cfg.owner || DEFAULTS.owner,
    repo: cfg.repo || DEFAULTS.repo,
    branch: cfg.branch || DEFAULTS.branch,
    filepath: cfg.filepath || DEFAULTS.filepath,
    token: cfg.token || '',
  };
}

// ====== 认证 ======
function doLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (pwd === getPassword()) {
    sessionStorage.setItem('vr_auth', '1');
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function showAdmin() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('adminView').style.display = 'block';
  loadHouses();
}

function doLogout() {
  sessionStorage.removeItem('vr_auth');
  location.reload();
}

// ====== 数据加载（优先 GitHub，回退到 localStorage） ======
const LOCAL_KEY = 'vr_local_data';

// 安全地用 atob 解码 UTF-8 base64
function b64DecodeUnicode(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function fetchFile() {
  const gh = getGhConfig();
  // 如果没有 Token，直接用本地数据
  if (!gh.token) {
    console.warn('未配置 GitHub Token，使用本地数据');
    const raw = localStorage.getItem(LOCAL_KEY);
    return raw ? JSON.parse(raw) : [];
  }
  const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.filepath}?ref=${gh.branch}`;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${gh.token}` },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    sha = json.sha;
    return JSON.parse(b64DecodeUnicode(json.content).replace(/\n$/, ''));
  } catch(e) {
    console.warn('GitHub 加载失败，使用本地数据:', e.message);
    const raw = localStorage.getItem(LOCAL_KEY);
    return raw ? JSON.parse(raw) : [];
  }
}

async function updateFile(data) {
  const gh = getGhConfig();
  // 没有 Token 就存本地
  if (!gh.token) {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
    return;
  }
  const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.filepath}`;
  const body = {
    message: `update: ${data.length} properties`,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
    sha: sha,
    branch: gh.branch,
  };
  const resp = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${gh.token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const errBody = await resp.json().catch(() => ({}));
    throw new Error(errBody.message || `HTTP ${resp.status}`);
  }
  const result = await resp.json();
  sha = result.content.sha;
}

// ====== 数据操作 ======
async function loadHouses() {
  showStatus('loading', '正在从 GitHub 加载...');
  try {
    houses = await fetchFile();
    renderList();
    showStatus('success', `已加载 ${houses.length} 套房源`);
  } catch(err) {
    showStatus('error', err.message);
  }
}

async function persistHouses() {
  showStatus('loading', '正在同步到 GitHub...');
  try {
    await updateFile(houses);
    showStatus('success', '✅ 已同步到 GitHub');
    setTimeout(() => hideStatus(), 3000);
  } catch(err) {
    showStatus('error', `同步失败: ${err.message}`);
  }
}

function nextId() {
  if (!houses.length) return 1;
  return Math.max(...houses.map(h => h.id || 0)) + 1;
}

function renderList() {
  const container = document.getElementById('houseList');
  if (!houses.length) {
    container.innerHTML = '<p style="text-align:center;color:#aaa;padding:40px 0;">暂无房源数据</p>';
    return;
  }
  container.innerHTML = houses.map(h => `
    <div class="house-item">
      <div class="house-info">
        <div class="addr">${h.address}</div>
        <div class="meta">
          ${h.type === 'agent' ? '🏢 中介' : '👤 个人'} ·
          ${h.price ? '¥' + Number(h.price).toLocaleString() + '/月' : '价格待定'} ·
          ${h.roomType || '房型未填'}
          ${h.satisfaction ? ' · ' + '⭐'.repeat(Math.max(1, h.satisfaction)) : ''}
        </div>
      </div>
      <div class="house-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEditModal(${h.id})">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteHouse(${h.id})">删除</button>
      </div>
    </div>
  `).join('');
}

// ====== 表单 ======
function openAddModal() {
  document.getElementById('editTitle').textContent = '新增房源';
  document.getElementById('editForm').reset();
  document.getElementById('f_id').value = '';
  currentStars = 0;
  updateStarDisplay(0);
  document.getElementById('editModal').classList.add('active');
}

function openEditModal(id) {
  const h = houses.find(d => d.id === id);
  if (!h) return;
  document.getElementById('editTitle').textContent = '编辑房源';
  document.getElementById('f_id').value = h.id;
  document.getElementById('f_type').value = h.type || 'personal';
  document.getElementById('f_status').value = h.status || 'viewing';
  document.getElementById('f_price').value = h.price || '';
  document.getElementById('f_address').value = h.address || '';
  document.getElementById('f_roomType').value = h.roomType || '';
  document.getElementById('f_floor').value = h.floor || '';
  document.getElementById('f_direction').value = h.direction || '';
  document.getElementById('f_area').value = h.area || '';
  document.getElementById('f_furniture').value = h.furniture || '';
  document.getElementById('f_lighting').value = h.lighting || '';
  document.getElementById('f_decor').value = h.decor || '';
  document.getElementById('f_lightingNote').value = h.lightingNote || '';
  document.getElementById('f_elevator').value = h.elevator || '';
  document.getElementById('f_waterElectric').value = h.waterElectric || '';
  document.getElementById('f_utility').value = h.utility || '';
  document.getElementById('f_electricPrice').value = h.electricPrice || '';
  document.getElementById('f_elecUsage').value = h.elecUsage || '425';
  document.getElementById('f_waterPrice').value = h.waterPrice || '';
  document.getElementById('f_waterUsage').value = h.waterUsage || '2';
  document.getElementById('f_propFee').value = h.propFee || '';
  document.getElementById('f_serviceFee').value = h.serviceFee || '';
  document.getElementById('f_deposit').value = h.deposit || '';
  document.getElementById('f_agentFee').value = h.agentFee || '';
  document.getElementById('f_leaseTerm').value = h.leaseTerm || '';
  document.getElementById('f_score').value = h.score || '';
  document.getElementById('f_viewTime').value = h.viewTime || '';
  document.getElementById('f_wechat').value = h.wechat || '';
  document.getElementById('f_source').value = h.source || '';
  document.getElementById('f_pros').value = h.pros || '';
  document.getElementById('f_cons').value = h.cons || '';
  document.getElementById('f_notes').value = h.notes || '';
  document.getElementById('f_satisfaction').value = h.satisfaction || '';
  currentStars = h.satisfaction || 0;
  updateStarDisplay(currentStars);
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

function setStar(v) {
  currentStars = v;
  document.getElementById('f_satisfaction').value = v;
  updateStarDisplay(v);
}

function updateStarDisplay(v) {
  const stars = document.querySelectorAll('#starInput .star');
  stars.forEach(s => {
    const val = parseInt(s.dataset.v);
    s.className = val <= v ? 'star active' : 'star inactive';
    s.textContent = val <= v ? '★' : '☆';
  });
}

async function saveHouse(e) {
  e.preventDefault();
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  try {
    const idEl = document.getElementById('f_id');
    const editId = idEl.value ? parseInt(idEl.value) : null;

    const house = {
      id: editId || nextId(),
      type: document.getElementById('f_type').value,
      status: document.getElementById('f_status').value,
      address: document.getElementById('f_address').value,
      price: document.getElementById('f_price').value || '',
      roomType: document.getElementById('f_roomType').value,
      floor: document.getElementById('f_floor').value,
      direction: document.getElementById('f_direction').value,
      area: document.getElementById('f_area').value,
      furniture: document.getElementById('f_furniture').value,
      lighting: document.getElementById('f_lighting').value,
      decor: document.getElementById('f_decor').value,
      lightingNote: document.getElementById('f_lightingNote').value,
      elevator: document.getElementById('f_elevator').value,
      waterElectric: document.getElementById('f_waterElectric').value,
      utility: document.getElementById('f_utility').value,
      electricPrice: document.getElementById('f_electricPrice').value,
      elecUsage: document.getElementById('f_elecUsage').value,
      waterPrice: document.getElementById('f_waterPrice').value,
      waterUsage: document.getElementById('f_waterUsage').value,
      propFee: document.getElementById('f_propFee').value,
      serviceFee: document.getElementById('f_serviceFee').value,
      deposit: document.getElementById('f_deposit').value,
      agentFee: document.getElementById('f_agentFee').value,
      leaseTerm: document.getElementById('f_leaseTerm').value,
      score: document.getElementById('f_score').value,
      viewTime: document.getElementById('f_viewTime').value,
      wechat: document.getElementById('f_wechat').value,
      source: document.getElementById('f_source').value,
      pros: document.getElementById('f_pros').value,
      cons: document.getElementById('f_cons').value,
      notes: document.getElementById('f_notes').value,
      satisfaction: document.getElementById('f_satisfaction').value || '',
    };

    if (editId) {
      const idx = houses.findIndex(d => d.id === editId);
      if (idx >= 0) houses[idx] = house;
    } else {
      houses.push(house);
    }

    await persistHouses();
    renderList();
    closeEditModal();
  } catch(err) {
    showStatus('error', `保存失败: ${err.message}`);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存';
  }
}

async function deleteHouse(id) {
  if (!confirm('确定删除这套房源？')) return;
  houses = houses.filter(d => d.id !== id);
  await persistHouses();
  renderList();
}

// ====== 设置 ======
function openSettings() {
  const gh = getGhConfig();
  document.getElementById('s_owner').value = gh.owner || '';
  document.getElementById('s_repo').value = gh.repo || '';
  document.getElementById('s_branch').value = gh.branch || '';
  document.getElementById('s_filepath').value = gh.filepath || '';
  document.getElementById('s_token').value = gh.token || '';
  document.getElementById('s_password').value = '';
  document.getElementById('settingsModal').classList.add('active');
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.remove('active');
}

function saveSettings() {
  const cfg = getConfig();
  cfg.owner = document.getElementById('s_owner').value.trim();
  cfg.repo = document.getElementById('s_repo').value.trim();
  cfg.branch = document.getElementById('s_branch').value.trim() || 'main';
  cfg.filepath = document.getElementById('s_filepath').value.trim() || 'data.json';
  cfg.token = document.getElementById('s_token').value.trim();

  const newPwd = document.getElementById('s_password').value;
  if (newPwd && newPwd.length >= 4) {
    cfg.password = newPwd;
  }

  setConfig(cfg);
  closeSettingsModal();
  loadHouses();
}

// ====== 状态提示 ======
function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = `status-msg show status-${type}`;
  el.textContent = msg;
}
function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// ====== 初始化 ======
(function init() {
  if (sessionStorage.getItem('vr_auth') === '1') {
    showAdmin();
  }
})();
</script>
