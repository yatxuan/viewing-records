<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理入口已迁移</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f5f6fa; color: #2d3436; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .card { width: min(420px, 100%); background: #fff; border: 1px solid #eceef3; border-radius: 16px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,.06); text-align: center; }
      h1 { color: #1a1a2e; font-size: 22px; margin-bottom: 10px; }
      p { color: #7b8494; font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
      .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      a { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 9px 16px; border-radius: 9px; font-size: 14px; font-weight: 800; text-decoration: none; }
      .primary { background: #6c5ce7; color: #fff; }
      .secondary { background: #edf0f5; color: #4b5563; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>管理功能已移到展示页</h1>
      <p>现在可以在房源列表直接新增、编辑、删除、筛选和设置数据源。</p>
      <div class="actions">
        <a class="primary" href="./index.html">返回展示页</a>
        <a class="secondary" href="./edit.html">新增房源</a>
      </div>
    </main>
  </body>
</html>
