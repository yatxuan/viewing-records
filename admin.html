<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 看房记录</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6fa; color: #2d3436; padding: 24px 16px; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  header p { color: #888; font-size: 13px; margin-top: 4px; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #6c5ce7; text-decoration: none; }
  .login-box { background: #fff; border-radius: 16px; padding: 32px; max-width: 360px; margin: 60px auto; box-shadow: 0 2px 12px rgba(0,0,0,.06); text-align: center; }
  .login-box h2 { margin-bottom: 20px; }
  .login-box input { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: #6c5ce7; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #6c5ce7; color: #fff; }
  .btn-primary:hover { background: #5b4cdb; }
  .btn-secondary { background: #dfe6e9; color: #2d3436; }
  .btn-danger { background: #ff7675; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
  .status-msg { padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .status-msg.success { background: #e8f5e9; color: #27ae60; }
  .status-msg.error { background: #fde8e8; color: #c0392b; }
  .status-msg.loading { background: #e8f4fd; color: #2980b9; }
  .house-item { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,.04); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .house-info .addr { font-weight: 600; font-size: 14px; }
  .house-info .meta { font-size: 12px; color: #888; margin-top: 2px; }
  .house-actions { display: flex; gap: 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal h2 { font-size: 20px; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #888; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6c5ce7; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .star-input { display: flex; gap: 4px; }
  .star-input span { font-size: 22px; cursor: pointer; }
  .star-input .active { color: #f39c12; }
  .star-input .inactive { color: #ddd; }
  .section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; margin: 16px 0 12px; }
  .section-title:first-child { margin-top: 0; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="app">
  <div class="container">
    <a href="./index.html" class="back-link">← 返回看房记录</a>

    <!-- Login -->
    <div v-if="!loggedIn">
      <div class="login-box">
        <h2>🔐 管理后台</h2>
        <p style="color:#e74c3c;font-size:13px;margin-bottom:12px;display:none" v-show="loginError">密码错误</p>
        <input type="password" v-model="loginPwd" placeholder="请输入管理密码" @keydown.enter="doLogin">
        <button class="btn btn-primary" @click="doLogin" style="width:100%">登录</button>
        <p style="font-size:12px;color:#aaa;margin-top:16px">默认密码: admin123</p>
      </div>
    </div>

    <!-- Admin -->
    <template v-else>
      <header><h1>📝 管理房源数据</h1><p>修改后自动同步到 GitHub</p></header>
      <div class="toolbar">
        <button class="btn btn-primary" @click="openAdd">＋ 新增房源</button>
        <button class="btn btn-secondary" @click="showSettings = true">⚙️ 设置</button>
        <button class="btn btn-secondary" @click="doLogout()">退出</button>
      </div>
      <div class="status-msg success" v-if="status">{{ status }}</div>
      <div class="house-item" v-for="h in houses" :key="h.id">
        <div class="house-info">
          <div class="addr">{{ h.address }}</div>
          <div class="meta">{{ h.type==='agent'?'🏢 中介':'👤 个人' }} · ¥{{ Number(h.price||0).toLocaleString() }}/月 · {{ h.roomType || '房型未填' }}</div>
        </div>
        <div class="house-actions">
          <button class="btn btn-secondary btn-sm" @click="openEdit(h)">编辑</button>
          <button class="btn btn-danger btn-sm" @click="delHouse(h.id)">删除</button>
        </div>
      </div>
    </template>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay show" v-if="showModal" @click.self="showModal=false">
    <div class="modal">
      <h2>{{ editId ? '编辑房源' : '新增房源' }}</h2>
      <form @submit.prevent="save">
        <div class="section-title">排序与状态</div>
        <div class="form-row">
          <div class="form-group"><label>类型</label>
            <select v-model="form.type"><option value="personal">个人转租</option><option value="agent">中介</option></select>
          </div>
          <div class="form-group"><label>状态</label>
            <select v-model="form.status">
              <option value="viewing">🔍 考虑中</option><option value="booked">⭐ 意向中</option>
              <option value="living">🏠 居住中</option><option value="rejected">❌ 不考虑</option>
            </select>
          </div>
        </div>

        <div class="section-title">基本信息</div>
        <div class="form-row full"><div class="form-group"><label>地址</label><input v-model="form.address" required></div></div>
        <div class="form-row">
          <div class="form-group"><label>房租（元/月）</label><input type="number" v-model="form.price"></div>
          <div class="form-group"><label>房型</label><input v-model="form.roomType"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>楼层</label><input v-model="form.floor"></div>
          <div class="form-group"><label>朝向</label>
            <select v-model="form.direction"><option value="">请选择</option><option v-for="d in directions" :value="d">{{ d }}</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>面积（㎡）</label><input type="number" step="0.1" v-model="form.area"></div>
          <div class="form-group"><label>家电情况</label><input v-model="form.furniture"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>采光</label><input v-model="form.lighting"></div>
          <div class="form-group"><label>装修</label>
            <select v-model="form.decor"><option value="">请选择</option><option value="毛坯">毛坯</option><option value="简装">简装</option><option value="精装">精装</option><option value="豪装">豪装</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>采光备注</label><input v-model="form.lightingNote"></div>
          <div class="form-group"><label>电梯</label>
            <select v-model="form.elevator"><option value="">请选择</option><option value="有电梯">有电梯</option><option value="无电梯">无电梯</option></select>
          </div>
        </div>

        <div class="section-title">费用明细</div>
        <div class="form-row">
          <div class="form-group"><label>水电网情况</label><input v-model="form.waterElectric"></div>
          <div class="form-group"><label>水电类型</label>
            <select v-model="form.utility"><option value="">请选择</option><option value="民水民电">民水民电</option><option value="商水商电">商水商电</option><option value="民水商电">民水商电</option><option value="不确定">不确定</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>电费（元/度）</label><input type="number" step="0.01" v-model="form.electricPrice"></div>
          <div class="form-group"><label>每月用电量（度）</label><input type="number" v-model="form.elecUsage" value="425"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>水费（元/吨）</label><input type="number" step="0.1" v-model="form.waterPrice"></div>
          <div class="form-group"><label>每月用水量（吨）</label><input type="number" v-model="form.waterUsage" value="2"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>物业费（元/㎡/月）</label><input type="number" step="0.1" v-model="form.propFee"></div>
          <div class="form-group"><label>服务费（元/月）</label><input type="number" v-model="form.serviceFee"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>押金方式</label>
            <select v-model="form.deposit"><option value="">请选择</option><option value="押一付一">押一付一</option><option value="押二付一">押二付一</option><option value="押一付三">押一付三</option></select>
          </div>
          <div class="form-group"><label>中介费</label><input v-model="form.agentFee"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>租期</label>
            <select v-model="form.leaseTerm"><option value="">请选择</option><option value="1年">1年</option><option value="半年">半年</option><option value="1年可续">1年可续</option></select>
          </div>
          <div class="form-group"><label>评分（1-10）</label>
            <select v-model="form.score"><option value="">打分</option><option v-for="s in 10" :value="s">{{ s }} · {{ ['','很差','较差','勉强','一般','还行','不错','很好','完美'][s] || '' }}</option></select>
          </div>
        </div>

        <div class="section-title">联系与备注</div>
        <div class="form-row">
          <div class="form-group"><label>看房时间</label><input v-model="form.viewTime"></div>
          <div class="form-group"><label>微信号</label><input v-model="form.wechat"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>来源</label>
            <select v-model="form.source"><option value="">— 无 —</option><option v-for="s in sources" :value="s">{{ s }}</option></select>
          </div>
          <div class="form-group"><label>满意度</label>
            <div class="star-input">
              <span v-for="i in 5" :key="i" :class="i <= form.satisfaction ? 'active' : 'inactive'" @click="form.satisfaction = i">★</span>
            </div>
          </div>
        </div>
        <div class="form-row full"><div class="form-group"><label>优点</label><textarea v-model="form.pros" placeholder="如：采光好、近地铁..."></textarea></div></div>
        <div class="form-row full"><div class="form-group"><label>缺点 / 隐忧</label><textarea v-model="form.cons" placeholder="如：楼道暗、周边吵..."></textarea></div></div>
        <div class="form-row full"><div class="form-group"><label>备注</label><textarea v-model="form.notes"></textarea></div></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" @click="showModal=false">取消</button>
          <button type="submit" class="btn btn-primary" :disabled="saving">{{ saving ? '保存中...' : '保存' }}</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay show" v-if="showSettings" @click.self="showSettings=false">
    <div class="modal">
      <h2>⚙️ 设置</h2>
      <div class="form-row full"><div class="form-group"><label>GitHub 用户名</label><input v-model="cfg.owner"></div></div>
      <div class="form-row full"><div class="form-group"><label>仓库名</label><input v-model="cfg.repo"></div></div>
      <div class="form-row">
        <div class="form-group"><label>分支</label><input v-model="cfg.branch"></div>
        <div class="form-group"><label>文件路径</label><input v-model="cfg.filepath"></div>
      </div>
      <div class="form-row full"><div class="form-group"><label>Personal Access Token</label>
        <input type="password" v-model="cfg.token" placeholder="ghp_xxxxxxxxxxxx">
        <small style="font-size:11px;color:#aaa"><a href="https://github.com/settings/tokens/new" target="_blank" style="color:#6c5ce7">创建 Token</a>（勾选 repo 权限）</small>
      </div></div>
      <div class="form-row full"><div class="form-group"><label>修改管理密码</label><input type="password" v-model="newPwd" placeholder="留空不修改"></div></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" @click="showSettings=false">取消</button>
        <button class="btn btn-primary" @click="saveSettings">保存设置</button>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

createApp({
  setup() {
    const loggedIn = ref(false);
    const loginPwd = ref('');
    const loginError = ref(false);
    const houses = ref([]);
    const showModal = ref(false);
    const showSettings = ref(false);
    const saving = ref(false);
    const status = ref('');
    const editId = ref(null);
    const newPwd = ref('');

    const DEFAULTS = { owner: 'yatxuan', repo: 'viewing-records', branch: 'main', filepath: 'data.json', password: 'admin123' };

    function getConfig() { try { return JSON.parse(localStorage.getItem('vr_config') || '{}'); } catch { return {}; } }
    function setConfig(cfg) { localStorage.setItem('vr_config', JSON.stringify(cfg)); }
    function getPassword() { return getConfig().password || DEFAULTS.password; }

    const directions = ['', '南', '东南', '东', '西南', '西', '北', '不确定'];
    const sources = ['', '抖音', '咸鱼', '小红书', '58同城', '豆瓣', '朋友圈', '其他'];

    const form = reactive({
      id: '', type: 'personal', status: 'viewing', address: '', price: '', roomType: '', floor: '', direction: '',
      area: '', furniture: '', lighting: '', decor: '', lightingNote: '', elevator: '', waterElectric: '', utility: '',
      electricPrice: '', elecUsage: '425', waterPrice: '', waterUsage: '2', propFee: '', serviceFee: '',
      deposit: '', agentFee: '', leaseTerm: '', score: '', viewTime: '', wechat: '', source: '',
      pros: '', cons: '', notes: '', satisfaction: ''
    });

    function resetForm() {
      Object.keys(form).forEach(k => { form[k] = k === 'elecUsage' || k === 'waterUsage' ? form[k] : ''; });
      form.elecUsage = '425'; form.waterUsage = '2'; form.status = 'viewing'; form.type = 'personal'; form.satisfaction = '';
    }

    function doLogin() {
      if (loginPwd.value === getPassword()) { loggedIn.value = true; loginPwd.value = ''; loginError.value = false; loadHouses(); }
      else loginError.value = true;
    }
    function doLogout() { loggedIn.value = false; location.reload(); }

    function getGhCfg() { const c = getConfig(); return { owner: c.owner || DEFAULTS.owner, repo: c.repo || DEFAULTS.repo, branch: c.branch || DEFAULTS.branch, filepath: c.filepath || DEFAULTS.filepath, token: c.token || '' }; }

    async function fetchFile() {
      const g = getGhCfg();
      if (!g.token) { const raw = localStorage.getItem('vr_local_data'); return raw ? JSON.parse(raw) : []; }
      try {
        const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.filepath}?ref=${g.branch}`;
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${g.token}` } });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        const bytes = Uint8Array.from(atob(json.content), c => c.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes).replace(/\n$/, ''));
      } catch(e) { console.warn('GitHub 失败:', e.message); const raw = localStorage.getItem('vr_local_data'); return raw ? JSON.parse(raw) : []; }
    }

    async function updateFile(data) {
      const g = getGhCfg();
      if (!g.token) { localStorage.setItem('vr_local_data', JSON.stringify(data)); return; }
      const url = `https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.filepath}`;
      const body = { message: `update: ${data.length} properties`, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))) };
      const resp = await fetch(url, { method: 'PUT', headers: { Authorization: `Bearer ${g.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    }

    async function loadHouses() { try { houses.value = await fetchFile(); setStatus('success', `已加载 ${houses.value.length} 套房源`); } catch(e) { setStatus('error', e.message); } }
    async function persist() { setStatus('loading', '同步中...'); try { await updateFile(houses.value); setStatus('success', '✅ 已同步到 GitHub'); setTimeout(() => status.value = '', 3000); } catch(e) { setStatus('error', '同步失败: ' + e.message); } }
    function nextId() { return houses.value.length ? Math.max(...houses.value.map(h => h.id || 0)) + 1 : 1; }
    function setStatus(type, msg) { status.value = `[${type}] ${msg}`; }

    function openAdd() { resetForm(); editId.value = null; showModal.value = true; }
    function openEdit(h) {
      resetForm(); editId.value = h.id;
      Object.keys(form).forEach(k => { if (h[k] !== undefined) form[k] = h[k]; });
      showModal.value = true;
    }

    async function save() {
      saving.value = true;
      try {
        const house = { ...form, id: editId.value || nextId() };
        if (editId.value) { const idx = houses.value.findIndex(d => d.id === editId.value); if (idx >= 0) houses.value[idx] = house; }
        else houses.value.push(house);
        await persist();
        showModal.value = false;
      } finally { saving.value = false; }
    }

    function delHouse(id) { if (!confirm('确定删除？')) return; houses.value = houses.value.filter(d => d.id !== id); persist(); }

    const cfg = reactive(getConfig());
    function saveSettings() {
      const c = { ...cfg };
      if (newPwd.value && newPwd.value.length >= 4) c.password = newPwd.value;
      setConfig(c); newPwd.value = ''; showSettings.value = false; loadHouses();
    }

    onMounted(() => { if (sessionStorage.getItem('vr_auth') === '1') loggedIn.value = true; });

    return { loggedIn, loginPwd, loginError, houses, showModal, showSettings, saving, status, editId,
      form, directions, sources, cfg, newPwd, doLogin, doLogout, openAdd, openEdit, save, delHouse, saveSettings };
  }
}).mount('#app');
</script>
</body>
</html>
