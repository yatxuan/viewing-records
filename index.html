<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的看房记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f6fa; color: #2d3436; padding: 24px 16px; min-height: 100vh;
  }

  .container { max-width: 900px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; letter-spacing: 1px; }
  header p { color: #888; font-size: 14px; margin-top: 6px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .tab {
    padding: 8px 24px; border-radius: 20px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .2s; border: 2px solid #e0e0e0; background: #fff; color: #888;
  }
  .tab.active { border-color: #6c5ce7; background: #6c5ce7; color: #fff; }
  .tab:hover:not(.active) { border-color: #b2bec3; color: #555; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

  .card {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer; position: relative;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }

  .card-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  }

  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .badge-personal { background: #e8f5e9; color: #2e7d32; }
  .badge-agent { background: #fff3e0; color: #e65100; }
  .source-tag { font-size: 11px; color: #999; padding: 3px 8px; background: #f0f0f0; border-radius: 10px; }

  .card-body { padding: 0 20px 16px; }

  .address {
    font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 14px; line-height: 1.5;
  }
  .address::before { content: "\1F4CD "; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }

  .info-item { display: flex; flex-direction: column; }
  .info-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .info-value { font-size: 14px; font-weight: 500; color: #333; }
  .info-value.price { color: #e74c3c; font-weight: 700; font-size: 18px; }
  .info-value.price span { font-size: 13px; font-weight: 400; color: #999; }
  .light-note { font-size: 12px; color: #888; margin-top: 2px; }

  .card-footer {
    padding: 14px 20px; border-top: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between; background: #fafbfc;
  }

  .wechat { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #07c160; font-weight: 600; }
  .wechat::before { content: "微信 "; font-size: 16px; }

  .view-time { font-size: 12px; color: #888; }
  .view-time::before { content: "\1F552 "; }

  .subsidy-info {
    grid-column: 1 / -1; background: #fef9e7; border-radius: 8px; padding: 8px 12px;
    font-size: 12px; color: #856404; line-height: 1.5;
  }

  .shui-dian { grid-column: 1 / -1; display: flex; gap: 16px; font-size: 13px; }
  .shui-dian .item { display: flex; align-items: center; gap: 4px; }
  .dot-electric { width: 8px; height: 8px; border-radius: 50%; background: #f39c12; display: inline-block; }
  .dot-water { width: 8px; height: 8px; border-radius: 50%; background: #3498db; display: inline-block; }

  /* Status bar */
  .status-bar {
    text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 10px;
    font-size: 13px; display: none;
  }
  .status-bar.loading { display: block; background: #e8f4fd; color: #2980b9; }
  .status-bar.error { display: block; background: #fde8e8; color: #c0392b; }
  .status-bar.ok { display: block; background: #e8f5e9; color: #27ae60; }

  .loading-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #2980b9; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .admin-link {
    position: fixed; bottom: 12px; right: 12px; opacity: 0.3; font-size: 12px;
    color: #999; text-decoration: none; transition: opacity 0.2s;
  }
  .admin-link:hover { opacity: 1; }

  /* Compare table */
  .compare-table {
    width: 100%; border-collapse: collapse; background: #fff;
    border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    font-size: 13px;
  }
  .compare-table th {
    background: #f8f9fa; padding: 10px 12px; text-align: left;
    font-size: 12px; color: #888; font-weight: 600; white-space: nowrap;
  }
  .compare-table td {
    padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: #fafafa; }
  .cost-low { color: #27ae60; font-weight: 600; background: #eafaf1 !important; }
  .cost-high { color: #e74c3c; font-weight: 600; background: #fdedec !important; }

  .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🏠 我的看房记录</h1>
    <p id="subtitle">加载中...</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="list">🏠 房源列表</div>
    <div class="tab" data-tab="compare">📊 对比分析</div>
  </div>

  <!-- List tab -->
  <div class="tab-content active" id="tab-list">
    <div class="status-bar loading" id="statusBar">
      <span class="loading-spinner"></span>正在加载数据...
    </div>
    <div class="cards" id="cardsContainer"></div>
  </div>

  <!-- Compare tab -->
  <div class="tab-content" id="tab-compare">
    <div id="compareContent">
      <div class="empty-state"><div class="icon">📊</div><p>至少添加 2 套有价格的房源才能对比</p></div>
    </div>
  </div>
</div>

<a class="admin-link" href="./admin.html">管理</a>

<script>
const CONFIG = { owner: 'yatxuan', repo: 'viewing-records', branch: 'main', filePath: 'data.json' };

// Safe UTF-8 base64 decode
function b64Decode(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function loadData() {
  const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filePath}?ref=${CONFIG.branch}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    return JSON.parse(b64Decode(json.content).replace(/\n$/, ''));
  } catch(e) {
    console.warn('GitHub 加载失败，使用本地数据:', e.message);
    const raw = localStorage.getItem('vr_local_data');
    if (raw) return JSON.parse(raw);
    return [];
  }
}

// ====== Render card ======
function renderCard(h) {
  const isPersonal = h.type === 'personal';
  const badgeClass = isPersonal ? 'badge-personal' : 'badge-agent';
  const badgeText = isPersonal ? '个人转租' : '中介';
  const sourceTag = h.source ? `<span class="source-tag">${h.source}</span>` : '<span class="source-tag">—</span>';

  let priceHtml = '';
  if (h.price) priceHtml = `<div class="info-item"><span class="info-label">房租</span><span class="info-value price">¥${Number(h.price).toLocaleString()}<span>/月</span></span></div>`;

  let roomHtml = '';
  if (h.roomType) {
    const floorStr = h.floor ? ` · ${h.floor}楼` : '';
    roomHtml = `<div class="info-item"><span class="info-label">房型</span><span class="info-value">${h.roomType}${floorStr}</span></div>`;
  }

  let furnitureHtml = '';
  if (h.furniture) furnitureHtml = `<div class="info-item"><span class="info-label">家电</span><span class="info-value">${h.furniture}</span></div>`;

  let lightingHtml = '';
  if (h.lighting) {
    const note = h.lightingNote ? `<span class="light-note">${h.lightingNote}</span>` : '';
    lightingHtml = `<div class="info-item"><span class="info-label">采光</span><span class="info-value">${h.lighting}</span>${note}</div>`;
  }

  // Water/electric display
  let waterElectricHtml = '';
  if (h.utility) {
    const cls = h.utility === '民水民电' ? '#27ae60' : (h.utility === '商水商电' ? '#e74c3c' : '#f39c12');
    waterElectricHtml = `<div class="info-item"><span class="info-label">水电类型</span><span class="info-value" style="color:${cls}">${h.utility}</span></div>`;
  } else if (h.waterElectric) {
    waterElectricHtml = `<div class="info-item"><span class="info-label">水电网</span><span class="info-value">${h.waterElectric}</span></div>`;
  } else if ((h.electricPrice || h.waterPrice)) {
    const items = [];
    if (h.electricPrice) items.push(`<div class="item"><span class="dot-electric"></span>电费 ¥${h.electricPrice}/度</div>`);
    if (h.waterPrice) items.push(`<div class="item"><span class="dot-water"></span>水费 ¥${h.waterPrice}/吨</div>`);
    waterElectricHtml = `<div class="shui-dian">${items.join('')}</div>`;
  }

  let viewTimeHtml = '';
  if (h.viewTime) viewTimeHtml = `<div class="info-item"><span class="info-label">看房时间</span><span class="info-value">${h.viewTime}</span></div>`;

  // Subsidy info
  let subsidyHtml = '';
  if (h.subsidy) {
    const s = h.subsidy;
    subsidyHtml = `<div class="subsidy-info">💰 有 ${s.amount} 元补贴（补贴到 ${s.until}）· 实付约 ${s.actual} 元</div>`;
  }

  // Notes with pros/cons
  let notesHtml = '';
  const parts = [];
  if (h.pros) parts.push(`✅ ${h.pros}`);
  if (h.cons) parts.push(`❌ ${h.cons}`);
  if (h.notes) parts.push(`📝 ${h.notes}`);
  if (parts.length) {
    notesHtml = `<div class="subsidy-info" style="background:#f0f3ff;color:#4a5568;line-height:1.8">${parts.join('<br>')}</div>`;
  }

  // Score badge
  let scoreHtml = '';
  if (h.score) {
    const sc = parseInt(h.score);
    const color = sc >= 8 ? '#27ae60' : (sc >= 6 ? '#3498db' : '#e74c3c');
    scoreHtml = `<div class="info-item"><span class="info-label">评分</span><span class="info-value" style="color:${color};font-weight:700;font-size:16px">⭐ ${h.score}/10</span></div>`;
  }

  // Satisfaction stars
  let satisfactionHtml = '';
  if (h.satisfaction && h.satisfaction > 0) {
    const labels = ['', '不满意', '一般', '满意', '很满意', '非常喜欢'];
    satisfactionHtml = `<div class="info-item" style="grid-column:1/-1"><span class="info-label">满意度</span><span style="font-size:18px">${'⭐'.repeat(h.satisfaction)}</span><span style="font-size:12px;color:#888">${labels[h.satisfaction] || ''}</span></div>`;
  }

  let wechatHtml = '';
  if (h.wechat) wechatHtml = `<span class="wechat">${h.wechat}</span>`;
  else wechatHtml = '<span class="wechat" style="color:#ccc">待联系</span>';

  return `
    <div class="card" onclick="openDetail(${h.id})">
      <div class="card-header">
        <span class="badge ${badgeClass}">${badgeText}</span>
        ${sourceTag}
      </div>
      <div class="card-body">
        <div class="address">${h.address}</div>
        <div class="info-grid">
          ${priceHtml}${roomHtml}${furnitureHtml}${lightingHtml}${waterElectricHtml}${viewTimeHtml}${scoreHtml}${subsidyHtml}${notesHtml}${satisfactionHtml}
        </div>
      </div>
      <div class="card-footer">
        ${wechatHtml}
        ${h.viewTime ? `<span class="view-time">${h.viewTime}</span>` : ''}
      </div>
    </div>`;
}

// ====== Detail overlay ======
function openDetail(id) {
  const h = houses.find(d => d.id === id);
  if (!h) return;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:16px';
  overlay.className = 'detail-overlay';

  const totalEst = calcTotal(h);

  let html = `<div style="background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">`;

  // Header
  html += `<div style="padding:24px 24px 20px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border-radius:16px 16px 0 0;margin:-16px -16px 0">`;
  html += `<div style="font-size:18px;font-weight:700;margin-bottom:4px">${h.address}</div>`;
  html += `<div style="font-size:28px;font-weight:800">${h.price ? '¥'+Number(h.price).toLocaleString()+'<span style="font-size:14px;font-weight:400">/月</span>' : '价格待定'}</div>`;
  if (totalEst.total > 0) html += `<div style="font-size:13px;opacity:.8;margin-top:4px">月总支出 ¥${totalEst.total.toLocaleString()}</div>`;
  html += `</div>`;

  // Sections
  const sections = [
    ['基本信息', [
      ['房型', h.roomType], ['楼层', h.floor ? h.floor+'楼' : '-'], ['朝向', h.direction || '-'],
      ['面积', h.area ? h.area+'㎡' : '-'], ['采光', h.lighting], ['采光备注', h.lightingNote],
      ['家电', h.furniture], ['装修', h.decor], ['电梯', h.elevator]
    ]],
    ['费用明细', [
      ['月租金', h.price ? '¥'+h.price : '-'],
      ['水电类型', h.utility || '-'],
      ['电费', h.electricPrice ? '¥'+h.electricPrice+'/度'+(h.elecUsage?' (约'+h.elecUsage+'度/月)':'') : '-'],
      ['水费', h.waterPrice ? '¥'+h.waterPrice+'/吨'+(h.waterUsage?' (约'+h.waterUsage+'吨/月)':'') : '-'],
      ['物业费', h.propFee ? '¥'+h.propFee+'/㎡'+(h.area?(' ×'+h.area+'㎡'):'') : '-'],
      ['服务费', h.serviceFee ? '¥'+h.serviceFee+'/月' : '-'],
      ['押金方式', h.deposit || '-'],
      ['中介费', h.agentFee || '-'],
      ['租期', h.leaseTerm || '-'],
      ['月总支出', totalEst.total > 0 ? '¥'+totalEst.total.toLocaleString()+'<small style="font-size:11px;color:#999"> ('+totalEst.detail+')' : '-']
    ]],
    ['评分', [
      ['综合评分', h.score ? '⭐ '+h.score+'/10' : '-'], ['满意度', h.satisfaction ? '⭐'.repeat(h.satisfaction) : '-']
    ]],
    ['联系信息', [
      ['看房时间', h.viewTime], ['微信号', h.wechat], ['来源', h.source], ['备注', h.notes]
    ]],
    ['优缺点', [
      ['优点', h.pros], ['缺点', h.cons]
    ]]
  ];

  for (const [title, rows] of sections) {
    const validRows = rows.filter(r => r[1]);
    if (!validRows.length) continue;
    html += `<div style="padding:16px 24px"><div style="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">${title}</div>`;
    for (const [label, value] of validRows) {
      let valCls = 'font-weight:500';
      if (label === '水电类型' && value === '民水民电') valCls = 'font-weight:600;color:#27ae60';
      if (label === '水电类型' && value === '商水商电') valCls = 'font-weight:600;color:#e74c3c';
      if (label === '月总支出') valCls = 'font-weight:700;color:#e74c3c;font-size:15px';
      html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px">`;
      html += `<span style="color:#999">${label}</span><span style="${valCls};text-align:right;max-width:60%">${value}</span></div>`;
    }
    html += '</div>';
  }

  html += `<div style="padding:12px 24px 24px;display:flex;gap:8px">`;
  html += `<button onclick="closeDetail()" style="flex:1;padding:12px;background:#6c5ce7;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">✏️ 编辑</button>`;
  html += `<button onclick="deleteHouse(${h.id})" style="padding:12px 16px;background:#fdedec;color:#e74c3c;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">🗑️ 删除</button>`;
  html += `</div></div>`;

  overlay.innerHTML = html;
  overlay.style.display = 'flex';
  overlay.onclick = (e) => { if (e.target === overlay) closeDetail(); };
  document.body.appendChild(overlay);
}

function closeDetail() {
  const overlays = document.querySelectorAll('.detail-overlay');
  overlays.forEach(o => o.remove());
}

function calcTotal(h) {
  const rent = parseFloat(h.price) || 0;
  const propFee = Math.round((parseFloat(h.propFee) || 0) * (parseFloat(h.area) || 0));
  const waterFee = Math.round((parseFloat(h.waterPrice) || 0) * (parseFloat(h.waterUsage) || 0));
  const elecFee = Math.round((parseFloat(h.elecPrice) || 0) * (parseFloat(h.elecUsage) || 0));
  const svcFee = parseFloat(h.serviceFee) || 0;
  const total = rent + propFee + svcFee + waterFee + elecFee;
  const details = [];
  if (waterFee) details.push('水'+waterFee);
  if (elecFee) details.push('电'+elecFee);
  if (propFee) details.push('物'+propFee);
  if (svcFee) details.push('服'+svcFee);
  return { total, detail: details.join('+') || '-' };
}

// ====== Compare ======
function renderCompare() {
  const container = document.getElementById('compareContent');
  const active = houses.filter(h => h.status !== 'rejected' && h.price);
  if (active.length < 2) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>至少添加 2 套有价格的房源才能对比<br>标记为"不考虑"的房源已自动排除</p></div>';
    return;
  }

  const sorted = active.slice().sort((a,b) => (parseFloat(a.price)||Infinity) - (parseFloat(b.price)||Infinity));
  const cheapest = sorted[0];

  let html = `<div style="text-align:center;padding:16px;background:#eafaf1;border-radius:12px;margin-bottom:20px">
    <div style="font-size:13px;color:#888;margin-bottom:4px">💰 最低月租</div>
    <div style="font-size:24px;font-weight:800;color:#27ae60">¥${Number(cheapest.price).toLocaleString()}/月</div>
    <div style="font-size:13px;color:#888;margin-top:4px">${cheapest.address.split('/').slice(-2).join('/')}</div>
  </div>`;

  html += `<table class="compare-table"><thead><tr><th>项目</th>`;
  sorted.forEach(h => {
    const shortAddr = h.address.split('/').slice(-2).join('/');
    html += `<th>${shortAddr}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const rows = [
    ['月租', h => `¥${Number(h.price).toLocaleString()}`, true],
    ['总月支出', h => { const t = calcTotal(h); return t.total > 0 ? '¥'+t.total.toLocaleString() : '-'; }, true],
    ['房型', h => h.roomType || '-'],
    ['楼层', h => h.floor ? h.floor+'楼' : '-'],
    ['朝向', h => h.direction || '-'],
    ['面积', h => h.area ? h.area+'㎡' : '-'],
    ['采光', h => h.lighting || '-'],
    ['水电类型', h => h.utility || '-'],
    ['电费', h => h.electricPrice ? '¥'+h.electricPrice+'/度' : '-'],
    ['水费', h => h.waterPrice ? '¥'+h.waterPrice+'/吨' : '-'],
    ['物业费', h => h.propFee ? '¥'+h.propFee+'/㎡' : '-'],
    ['服务费', h => h.serviceFee ? '¥'+h.serviceFee : '-'],
    ['押金', h => h.deposit || '-'],
    ['装修', h => h.decor || '-'],
    ['电梯', h => h.elevator || '-'],
    ['租期', h => h.leaseTerm || '-'],
    ['看房时间', h => h.viewTime || '-'],
    ['微信号', h => h.wechat || '-'],
    ['评分', h => h.score ? '⭐'+h.score+'/10' : '-'],
    ['满意度', h => h.satisfaction ? '⭐'.repeat(h.satisfaction) : '-'],
  ];

  for (const [label, fn, cost] of rows) {
    html += `<tr><td style="color:#888;font-weight:500">${label}</td>`;
    sorted.forEach(h => {
      const val = fn(h);
      let cls = '';
      if (cost && val !== '-') {
        const num = parseFloat(val.replace(/[^\d.]/g,''));
        if (num === cheapest.price) cls = 'cost-low';
        else if (num === Math.max(...sorted.map(x=>parseFloat(fn(x).replace(/[^\d.]/g,''))))) cls = 'cost-high';
      }
      html += `<td style="${cls}">${val}</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody></table>';

  // Pros/cons summary
  sorted.forEach(h => {
    if (!h.pros && !h.cons) return;
    html += `<div style="background:#fff;border-radius:12px;padding:16px;margin:16px 0;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <h3 style="font-size:14px;color:#888;margin-bottom:12px">${h.address.split('/').slice(-2).join('/')}</h3>`;
    if (h.pros) html += `<div style="color:#27ae60;font-size:13px;line-height:1.8">✅ ${h.pros}</div>`;
    if (h.cons) html += `<div style="color:#e74c3c;font-size:13px;line-height:1.8;margin-top:4px">❌ ${h.cons}</div>`;
    html += '</div>';
  });

  container.innerHTML = html;
}

// ====== Tab switch ======
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'compare') renderCompare();
  });
});

// ====== Global data & ops ======
let houses = [];

async function init() {
  const statusBar = document.getElementById('statusBar');
  try {
    houses = await loadData();
    statusBar.className = 'status-bar ok';
    statusBar.textContent = `✅ 共 ${houses.length} 套房源 · ${new Date().toLocaleDateString('zh-CN')}`;
    renderList();
  } catch(err) {
    statusBar.className = 'status-bar error';
    statusBar.textContent = `⚠️ 加载失败: ${err.message}`;
  }
}

function renderList() {
  const container = document.getElementById('cardsContainer');
  document.getElementById('subtitle').textContent = `共 ${houses.length} 套房源`;

  if (!houses.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>暂无房源数据<br>点击右下角"管理"添加</p></div>';
    return;
  }
  container.innerHTML = houses.map(renderCard).join('');
}

window.openDetail = openDetail;
window.closeDetail = closeDetail;
window.calcTotal = calcTotal;
init();
</script>
