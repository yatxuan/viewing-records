<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的看房记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f6fa; color: #2d3436; padding: 24px 16px; min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  header p { color: #888; font-size: 14px; margin-top: 4px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

  .card {
    background: #fff; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .card-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-personal { background: #e8f5e9; color: #2e7d32; }
  .badge-agent { background: #fff3e0; color: #e65100; }
  .source-tag { font-size: 11px; color: #999; padding: 3px 8px; background: #f0f0f0; border-radius: 10px; }
  .card-body { padding: 0 20px 16px; }
  .address { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 14px; line-height: 1.5; }
  .address::before { content: "\1F4CD "; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
  .info-item { display: flex; flex-direction: column; }
  .info-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .info-value { font-size: 14px; font-weight: 500; color: #333; }
  .info-value.price { color: #e74c3c; font-weight: 700; font-size: 18px; }
  .info-value.price span { font-size: 13px; font-weight: 400; color: #999; }
  .light-note { font-size: 12px; color: #888; margin-top: 2px; }
  .card-footer {
    padding: 14px 20px; border-top: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between; background: #fafbfc;
  }
  .wechat { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #07c160; font-weight: 600; }
  .wechat::before { content: "微信 "; font-size: 16px; }
  .view-time { font-size: 12px; color: #888; }
  .view-time::before { content: "\1F552 "; }
  .subsidy-info {
    grid-column: 1 / -1; background: #fef9e7; border-radius: 8px; padding: 8px 12px;
    font-size: 12px; color: #856404; line-height: 1.5;
  }
  .shui-dian { grid-column: 1 / -1; display: flex; gap: 16px; font-size: 13px; }
  .shui-dian .item { display: flex; align-items: center; gap: 4px; }
  .dot-electric { width: 8px; height: 8px; border-radius: 50%; background: #f39c12; display: inline-block; }
  .dot-water { width: 8px; height: 8px; border-radius: 50%; background: #3498db; display: inline-block; }
  .satisfaction {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: #f0f3ff; border-radius: 8px; margin-top: 4px;
  }
  .stars { display: flex; gap: 2px; }
  .star { font-size: 18px; }
  .star.active { color: #f39c12; }
  .star.inactive { color: #ddd; }
  .satisfaction-text { font-size: 12px; color: #666; }

  /* Loading & Error */
  .status-bar {
    text-align: center; padding: 12px; margin-bottom: 20px; border-radius: 10px;
    font-size: 13px; display: none;
  }
  .status-bar.loading { display: block; background: #e8f4fd; color: #2980b9; }
  .status-bar.error { display: block; background: #fde8e8; color: #c0392b; }
  .status-bar.ok { display: block; background: #e8f5e9; color: #27ae60; }

  .loading-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #2980b9; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .admin-link {
    position: fixed; bottom: 12px; right: 12px; opacity: 0.3; font-size: 12px;
    color: #999; text-decoration: none; transition: opacity 0.2s;
  }
  .admin-link:hover { opacity: 1; }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🏠 我的看房记录</h1>
    <p id="subtitle">加载中...</p>
  </header>

  <div class="status-bar loading" id="statusBar">
    <span class="loading-spinner"></span>正在加载数据...
  </div>

  <div class="cards" id="cardsContainer"></div>
</div>

<a class="admin-link" href="./admin.html">管理</a>

<script>
// ====== 配置区：部署时改成你自己的值 ======
const CONFIG = {
  owner: 'yatxuan',           // GitHub 用户名
  repo: 'viewing-records',    // 仓库名
  branch: 'main',             // 分支名
  filePath: 'data.json',      // 数据文件路径
};
// ==========================================

const STAR_LABELS = ['', '不满意', '一般', '满意', '很满意', '非常喜欢'];

function renderStars(value) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const cls = i <= value ? 'active' : 'inactive';
    html += `<span class="star ${cls}">${i <= value ? '★' : '☆'}</span>`;
  }
  return html;
}

function renderCard(h) {
  const isPersonal = h.type === 'personal';
  const badgeClass = isPersonal ? 'badge-personal' : 'badge-agent';
  const badgeText = isPersonal ? '个人转租' : '中介';
  const sourceTag = h.source ? `<span class="source-tag">${h.source}</span>` : '<span class="source-tag">—</span>';

  let priceHtml = '';
  if (h.price) priceHtml = `<div class="info-item"><span class="info-label">房租</span><span class="info-value price">¥${Number(h.price).toLocaleString()}<span>/月</span></span></div>`;

  let roomHtml = '';
  if (h.roomType) roomHtml = `<div class="info-item"><span class="info-label">房型</span><span class="info-value">${h.roomType}${h.floor ? ' · ' + h.floor + '楼' : ''}</span></div>`;

  let furnitureHtml = '';
  if (h.furniture) furnitureHtml = `<div class="info-item"><span class="info-label">家电</span><span class="info-value">${h.furniture}</span></div>`;

  let lightingHtml = '';
  if (h.lighting) {
    const note = h.lightingNote ? `<span class="light-note">${h.lightingNote}</span>` : '';
    lightingHtml = `<div class="info-item"><span class="info-label">采光</span><span class="info-value">${h.lighting}</span>${note}</div>`;
  }

  let waterElectricHtml = '';
  if (h.waterElectric) {
    waterElectricHtml = `<div class="info-item"><span class="info-label">水电网</span><span class="info-value">${h.waterElectric}</span></div>`;
  } else if (h.electricPrice || h.waterPrice) {
    const items = [];
    if (h.electricPrice) items.push(`<div class="item"><span class="dot-electric"></span>电费 ¥${h.electricPrice}/度</div>`);
    if (h.waterPrice) items.push(`<div class="item"><span class="dot-water"></span>水费 ¥${h.waterPrice}/吨</div>`);
    waterElectricHtml = `<div class="shui-dian">${items.join('')}</div>`;
  }

  let viewTimeHtml = '';
  if (h.viewTime) viewTimeHtml = `<div class="info-item"><span class="info-label">看房时间</span><span class="info-value">${h.viewTime}</span></div>`;

  let subsidyHtml = '';
  if (h.subsidy) {
    const s = h.subsidy;
    subsidyHtml = `<div class="subsidy-info">💰 有 ${s.amount} 元补贴（补贴到 ${s.until}）· 实付约 ${s.actual} 元</div>`;
  }

  let notesHtml = '';
  if (h.notes) notesHtml = `<div class="subsidy-info" style="background:#f0f3ff;color:#4a5568;">📝 ${h.notes}</div>`;

  let wechatHtml = '';
  if (h.wechat) wechatHtml = `<span class="wechat">${h.wechat}</span>`;
  else wechatHtml = '<span class="wechat" style="color:#ccc;">待联系</span>';

  let satisfactionHtml = '';
  if (h.satisfaction && h.satisfaction > 0) {
    satisfactionHtml = `<div class="satisfaction"><div class="stars">${renderStars(h.satisfaction)}</div><span class="satisfaction-text">${STAR_LABELS[h.satisfaction] || ''}</span></div>`;
  }

  return `
    <div class="card">
      <div class="card-header">
        <span class="badge ${badgeClass}">${badgeText}</span>
        ${sourceTag}
      </div>
      <div class="card-body">
        <div class="address">${h.address}</div>
        <div class="info-grid">
          ${priceHtml}${roomHtml}${furnitureHtml}${lightingHtml}${waterElectricHtml}${viewTimeHtml}${subsidyHtml}${notesHtml}${satisfactionHtml}
        </div>
      </div>
      <div class="card-footer">
        ${wechatHtml}
        ${h.viewTime ? `<span class="view-time">${h.viewTime}</span>` : ''}
      </div>
    </div>`;
}

// 安全地用 atob 解码 UTF-8 base64
function b64Decode(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function loadData() {
  const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filePath}?ref=${CONFIG.branch}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    return JSON.parse(b64Decode(json.content).replace(/\n$/, ''));
  } catch(e) {
    console.warn('GitHub 加载失败，使用本地数据:', e.message);
    const raw = localStorage.getItem('vr_local_data');
    if (raw) return JSON.parse(raw);
    return [
      {"id":1,"type":"personal","address":"广东省深圳市龙岗区龙城街道牛仔园新村一巷7号楼","price":1350,"roomType":"一房一厅","floor":"2","furniture":"包家电","lighting":"一般","lightingNote":"关下半窗 + 开灯","waterElectric":"","waterPrice":"","electricPrice":"","viewTime":"明天中午","wechat":"z1402460782","source":"","notes":""},
      {"id":2,"type":"personal","address":"广东省深圳市龙岗区怡苑路35号","price":1570,"roomType":"单色带阳台（公寓）","floor":"","furniture":"","lighting":"还行","lightingNote":"","waterElectric":"包管理+网络","waterPrice":"","electricPrice":"","viewTime":"待定","wechat":"Aurora_Luou","source":"抖音","notes":""},
      {"id":3,"type":"personal","address":"广东省深圳市龙岗区百花一街与宝丽路交叉口北120米","price":1300,"roomType":"一室一厅","floor":"6","furniture":"需接手家电","lighting":"未知","lightingNote":"","waterElectric":"","waterPrice":"6","electricPrice":"0.8","viewTime":"今晚8点后","wechat":"xiao-xue-ming","source":"咸鱼","notes":""},
      {"id":4,"type":"personal","address":"广东省深圳市龙岗区新城路157号","price":1500,"roomType":"隔间的一房一厅","floor":"","furniture":"","lighting":"未提及","lightingNote":"","waterElectric":"","waterPrice":"","electricPrice":"","viewTime":"待定","wechat":"","source":"小红书","notes":""},
      {"id":5,"type":"agent","address":"大运","price":"","roomType":"","floor":"","furniture":"","lighting":"","lightingNote":"","waterElectric":"","waterPrice":"","electricPrice":"","viewTime":"明天","wechat":"","source":"","notes":"中介推荐"}
    ];
  }
}

async function init() {
  const statusBar = document.getElementById('statusBar');
  const subtitle = document.getElementById('subtitle');
  const container = document.getElementById('cardsContainer');

  try {
    const data = await loadData();
    const isLocal = data.length === 5 && data[0].address.includes('牛仔园') && data[4].address === '大运';
    statusBar.className = 'status-bar ok';
    if (isLocal) {
      statusBar.textContent = '⚠️ 正在使用本地数据（未连接 GitHub）';
    } else {
      statusBar.textContent = `✅ 数据已更新 · ${new Date().toLocaleString('zh-CN')}`;
    }
    subtitle.textContent = `共 ${data.length} 套房源`;
    if (!data.length) {
      container.innerHTML = '<p style="text-align:center;color:#aaa;grid-column:1/-1;padding:60px 0;">暂无房源数据</p>';
      return;
    }
    container.innerHTML = data.map(renderCard).join('');
  } catch(err) {
    console.error(err);
    statusBar.className = 'status-bar error';
    statusBar.textContent = `⚠️ 加载失败: ${err.message}`;
    subtitle.textContent = '';
    container.innerHTML = '';
  }
}

init();
</script>
</body>
</html>
